name: Daily news refresh

on:
  schedule:
    # 06:00 UTC = 07:00 BST (British Summer Time, UTC+1)
    # Change to 07:00 UTC in winter when UK returns to GMT
    - cron: '0 6 * * *'
  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit news.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch latest news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news.json
          git diff --cached --quiet || git commit -m "chore: daily news refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
